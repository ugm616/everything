<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everything Clicker</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a12;
      --panel:    #12121e;
      --border:   #2a2a40;
      --accent:   #7c6aff;
      --accent2:  #ff6ab0;
      --gold:     #f0c040;
      --text:     #d0d0e8;
      --text-dim: #7070a0;
      --green:    #40e0a0;
      --red:      #ff5060;
      --radius:   10px;
      --shadow:   0 4px 24px rgba(0,0,0,.6);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ─── Layout ────────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      grid-template-rows: 48px 1fr;
      width: 100vw; height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────────── */
    #header {
      grid-column: 1 / -1;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
    }
    #header h1 { font-size: 18px; color: var(--accent); letter-spacing: 1px; }
    #header-stats { display: flex; gap: 24px; font-size: 13px; }
    #header-stats span { color: var(--text-dim); }
    #header-stats strong { color: var(--gold); }
    #header-btns { display: flex; gap: 8px; }
    .hbtn {
      background: var(--border); color: var(--text); border: none;
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
      transition: background .15s;
    }
    .hbtn:hover { background: var(--accent); }

    /* ─── Left Panel – Upgrades ─────────────────────────────────────── */
    #upgrades-panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      padding: 10px 14px;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      color: var(--text-dim); text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #upgrades-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start;
    }
    .upgrade-btn {
      width: 48px; height: 48px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, transform .1s, opacity .15s;
      position: relative;
    }
    .upgrade-btn:hover { border-color: var(--accent); transform: scale(1.08); }
    .upgrade-btn.affordable { border-color: var(--gold); }
    .upgrade-btn.purchased { opacity: .35; cursor: default; transform: none !important; }
    .upgrade-btn .tooltip {
      display: none;
      position: absolute; left: 54px; top: 0; z-index: 100;
      background: #1a1a2e; border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      width: 200px; font-size: 12px; line-height: 1.5;
      pointer-events: none; white-space: normal;
    }
    .upgrade-btn:hover .tooltip { display: block; }
    .tooltip strong { color: var(--gold); display: block; margin-bottom: 4px; }
    .tooltip .cost { color: var(--accent2); }
    .tooltip .effect { color: var(--green); }

    /* ─── Centre Panel – Clicker ────────────────────────────────────── */
    #clicker-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; position: relative; overflow: hidden;
    }

    #big-cookie {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        #9a80ff 0%, #5a40cc 50%, #3020aa 100%);
      border: 4px solid var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
      user-select: none;
      transition: transform .08s, box-shadow .08s;
      box-shadow: 0 0 40px rgba(124,106,255,.5), var(--shadow);
    }
    #big-cookie:hover { box-shadow: 0 0 60px rgba(124,106,255,.8), var(--shadow); }
    #big-cookie:active { transform: scale(.94); }

    #things-display {
      text-align: center;
    }
    #things-count {
      font-size: 32px; font-weight: 700; color: var(--gold);
      text-shadow: 0 0 12px rgba(240,192,64,.4);
    }
    #things-label { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    #cps-display { font-size: 15px; color: var(--green); }
    #cpc-display { font-size: 12px; color: var(--text-dim); }

    /* click particles */
    .click-particle {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 8px rgba(240,192,64,.7);
      z-index: 999;
      animation: float-up .9s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-70px) scale(.6); }
    }

    /* milestone flash */
    .milestone-flash {
      position: fixed; top: 56px; left: 50%;
      transform: translateX(-50%);
      background: var(--gold); color: #1a1000;
      padding: 8px 24px; border-radius: 20px;
      font-weight: 700; font-size: 14px;
      z-index: 1000;
      animation: milestone-in 3s ease forwards;
      pointer-events: none;
    }
    @keyframes milestone-in {
      0%   { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ─── Right Panel – Buildings ────────────────────────────────────── */
    #buildings-panel {
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #buildings-list { flex: 1; overflow-y: auto; }

    .building-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
      position: relative;
    }
    .building-row:hover { background: rgba(124,106,255,.08); }
    .building-row.unaffordable { opacity: .5; }
    .building-row.unaffordable:hover { background: transparent; }

    .building-icon { font-size: 28px; flex-shrink: 0; }
    .building-info { flex: 1; min-width: 0; }
    .building-name { font-size: 13px; font-weight: 600; }
    .building-cost { font-size: 11px; color: var(--accent2); }
    .building-prod { font-size: 11px; color: var(--green); }
    .building-count {
      font-size: 20px; font-weight: 700; color: var(--accent);
      flex-shrink: 0; min-width: 32px; text-align: right;
    }

    .building-row .btooltip {
      display: none;
      position: absolute; right: 100%; top: 0;
      background: #1a1a2e; border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      width: 200px; font-size: 12px; line-height: 1.6;
      z-index: 100; pointer-events: none;
    }
    .building-row:hover .btooltip { display: block; }
    .btooltip strong { color: var(--gold); display: block; margin-bottom: 4px; }

    /* ─── Achievements ────────────────────────────────────────────── */
    #achievements-panel {
      display: none;
      position: fixed; inset: 48px 0 0 0;
      background: rgba(10,10,18,.97);
      z-index: 200;
      overflow-y: auto;
      padding: 20px;
    }
    #achievements-panel.open { display: block; }
    #achievements-panel h2 { color: var(--gold); margin-bottom: 16px; }
    #ach-grid {
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    .ach-item {
      width: 64px; height: 64px;
      border-radius: 10px;
      background: var(--panel);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      position: relative;
      transition: border-color .15s;
    }
    .ach-item.unlocked { border-color: var(--gold); }
    .ach-item.locked { filter: grayscale(1) opacity(.4); }
    .ach-item .ach-tooltip {
      display: none;
      position: absolute; top: 70px; left: 0;
      background: #1a1a2e; border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      width: 160px; font-size: 11px; line-height: 1.5; z-index: 10;
    }
    .ach-item:hover .ach-tooltip { display: block; }

    /* ─── Scrollbar ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>✨ Everything Clicker</h1>
    <div id="header-stats">
      <span>Total Things: <strong id="hs-total">0</strong></span>
      <span>All-time: <strong id="hs-alltime">0</strong></span>
    </div>
    <div id="header-btns">
      <button class="hbtn" onclick="openAchievements()">🏆 Achievements</button>
      <button class="hbtn" onclick="saveGame()">💾 Save</button>
      <button class="hbtn" onclick="confirmReset()">🔄 Reset</button>
    </div>
  </header>

  <!-- Left: Upgrades -->
  <aside id="upgrades-panel">
    <div class="panel-title">Upgrades</div>
    <div id="upgrades-list"></div>
  </aside>

  <!-- Centre: Clicker -->
  <main id="clicker-panel">
    <div id="things-display">
      <div id="things-count">0</div>
      <div id="things-label">Things</div>
    </div>
    <div id="big-cookie" onclick="handleClick(event)">✨</div>
    <div>
      <div id="cps-display">0 things per second</div>
      <div id="cpc-display">1 thing per click</div>
    </div>
  </main>

  <!-- Right: Buildings -->
  <aside id="buildings-panel">
    <div class="panel-title">Create Everything</div>
    <div id="buildings-list"></div>
  </aside>

</div>

<!-- Achievements overlay -->
<div id="achievements-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h2>🏆 Achievements</h2>
    <button class="hbtn" onclick="closeAchievements()">✕ Close</button>
  </div>
  <div id="ach-grid"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  DATA DEFINITIONS
// ═══════════════════════════════════════════════════════════════════════

const BUILDINGS = [
  { id:'atom',       name:'Atom',       icon:'⚛️',  baseCost:15,        baseCps:.1,    desc:'The building block of matter. Each atom vibrates with potential.' },
  { id:'molecule',   name:'Molecule',   icon:'🔬',  baseCost:100,       baseCps:.5,    desc:'Atoms bonded together, forming something new.' },
  { id:'cell',       name:'Cell',       icon:'🦠',  baseCost:1100,      baseCps:4,     desc:'The smallest unit of life, brimming with complexity.' },
  { id:'organism',   name:'Organism',   icon:'🌿',  baseCost:12000,     baseCps:10,    desc:'A collection of cells conspiring to be something more.' },
  { id:'mind',       name:'Mind',       icon:'🧠',  baseCost:130000,    baseCps:40,    desc:'Consciousness arose, and Everything became aware of itself.' },
  { id:'ecosystem',  name:'Ecosystem',  icon:'🌍',  baseCost:1400000,   baseCps:100,   desc:'Billions of organisms in a delicate, churning balance.' },
  { id:'planet',     name:'Planet',     icon:'🪐',  baseCost:20000000,  baseCps:400,   desc:'A world of its own — mountains, oceans, skies.' },
  { id:'galaxy',     name:'Galaxy',     icon:'🌌',  baseCost:330000000, baseCps:1666,  desc:'A hundred billion stars, each a possible story.' },
  { id:'universe',   name:'Universe',   icon:'🌀',  baseCost:5100000000,baseCps:6666,  desc:'All of spacetime — past, present, future.' },
  { id:'everything', name:'Everything', icon:'✨',  baseCost:75000000000,baseCps:26666,desc:'You have created Everything. But what lies beyond?' },
];

const UPGRADES = [
  // ── Click upgrades ──────────────────────────────────────────────────
  { id:'click1',  name:'Curious Fingers',   icon:'👆', cost:100,       desc:'Your click produces 2× more Things.',       type:'click', mult:2 },
  { id:'click2',  name:'Eager Hands',       icon:'🤲', cost:500,       desc:'Your click produces 2× more Things.',       type:'click', mult:2 },
  { id:'click3',  name:'Nimble Palms',      icon:'👐', cost:10000,     desc:'Your click produces 2× more Things.',       type:'click', mult:2 },
  { id:'click4',  name:'Blazing Digits',    icon:'⚡', cost:100000,    desc:'Your click produces 2× more Things.',       type:'click', mult:2 },
  { id:'click5',  name:'Cosmic Touch',      icon:'🌟', cost:10000000,  desc:'Your click produces 2× more Things.',       type:'click', mult:2 },

  // ── Building upgrades (×2 per milestone: 1, 10, 50, 100, 200) ──────
  ...makeBuildingUpgrades(),
];

function makeBuildingUpgrades() {
  const milestones = [1, 10, 50, 100, 200];
  const flavour = ['Improved','Enhanced','Advanced','Superior','Ultimate'];
  const ups = [];
  BUILDINGS.forEach(b => {
    milestones.forEach((m, i) => {
      ups.push({
        id: `${b.id}_up${i}`,
        name: `${flavour[i]} ${b.name}`,
        icon: b.icon,
        cost: Math.floor(b.baseCost * m * 5),
        desc: `${b.name}s produce 2× more Things. (Requires ${m} ${b.name}s)`,
        type: 'building',
        building: b.id,
        requires: m,
        mult: 2,
      });
    });
  });
  return ups;
}

const ACHIEVEMENTS = [
  { id:'ach_first_click',   name:'First Step',       icon:'👆', desc:'Click for the first time.' },
  { id:'ach_100_things',    name:'Hundredaire',       icon:'💯', desc:'Accumulate 100 Things.' },
  { id:'ach_1k_things',     name:'Thousandaire',      icon:'🔢', desc:'Accumulate 1,000 Things.' },
  { id:'ach_1m_things',     name:'Millionaire',       icon:'💰', desc:'Accumulate 1,000,000 Things.' },
  { id:'ach_1b_things',     name:'Billionaire',       icon:'🤑', desc:'Accumulate 1,000,000,000 Things.' },
  { id:'ach_1t_things',     name:'Trillionaire',      icon:'🚀', desc:'Accumulate 1,000,000,000,000 Things.' },
  { id:'ach_first_atom',    name:'Atom Smasher',      icon:'⚛️',  desc:'Buy your first Atom.' },
  { id:'ach_first_cell',    name:'Origins of Life',   icon:'🦠', desc:'Buy your first Cell.' },
  { id:'ach_first_mind',    name:'A Thought',         icon:'🧠', desc:'Buy your first Mind.' },
  { id:'ach_first_galaxy',  name:'Star Gazer',        icon:'🌌', desc:'Buy your first Galaxy.' },
  { id:'ach_first_universe',name:'Cosmologist',       icon:'🌀', desc:'Buy your first Universe.' },
  { id:'ach_everything',    name:'Creator of All',    icon:'✨', desc:'Buy your first Everything.' },
  { id:'ach_100_atoms',     name:'Molecular Cloud',   icon:'☁️',  desc:'Own 100 Atoms.' },
  { id:'ach_50_minds',      name:'Hive Mind',         icon:'🕸️',  desc:'Own 50 Minds.' },
  { id:'ach_10_cps',        name:'Running Start',     icon:'🏃', desc:'Reach 10 things/sec.' },
  { id:'ach_1000_cps',      name:'Momentum',          icon:'⚡', desc:'Reach 1,000 things/sec.' },
  { id:'ach_1m_cps',        name:'Unstoppable',       icon:'🌊', desc:'Reach 1,000,000 things/sec.' },
  { id:'ach_click_100',     name:'Persistent',        icon:'💪', desc:'Click 100 times.' },
  { id:'ach_click_1000',    name:'Dedicated',         icon:'🏅', desc:'Click 1,000 times.' },
  { id:'ach_all_buildings', name:'Collector',         icon:'🗃️',  desc:'Own at least one of every building.' },
];

// ═══════════════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════════════

let G = createInitialState();

function createInitialState() {
  return {
    things: 0,
    allTime: 0,
    clickCount: 0,
    buildings: Object.fromEntries(BUILDINGS.map(b => [b.id, 0])),
    purchasedUpgrades: new Set(),
    unlockedAchievements: new Set(),
    lastSave: Date.now(),
  };
}

// ─── derived multipliers ───────────────────────────────────────────────
function getClickMultiplier() {
  let m = 1;
  for (const u of UPGRADES) {
    if (u.type === 'click' && G.purchasedUpgrades.has(u.id)) m *= u.mult;
  }
  return m;
}

function getBuildingMultiplier(buildingId) {
  let m = 1;
  for (const u of UPGRADES) {
    if (u.type === 'building' && u.building === buildingId && G.purchasedUpgrades.has(u.id)) {
      m *= u.mult;
    }
  }
  return m;
}

function totalCps() {
  return BUILDINGS.reduce((sum, b) => {
    return sum + b.baseCps * G.buildings[b.id] * getBuildingMultiplier(b.id);
  }, 0);
}

function thingsPerClick() {
  // base = 1 + 1% of total cps
  const base = 1 + totalCps() * 0.01;
  return base * getClickMultiplier();
}

function buildingCost(b) {
  return Math.floor(b.baseCost * Math.pow(1.15, G.buildings[b.id]));
}

// ═══════════════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════════════

let lastTick = Date.now();

function tick() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000;
  lastTick = now;

  const earned = totalCps() * dt;
  G.things += earned;
  G.allTime += earned;

  updateDisplay();
  checkAchievements();

  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════════════════════
//  CLICK HANDLER
// ═══════════════════════════════════════════════════════════════════════

function handleClick(e) {
  const gain = thingsPerClick();
  G.things += gain;
  G.allTime += gain;
  G.clickCount++;

  // floating text
  const span = document.createElement('span');
  span.className = 'click-particle';
  span.textContent = '+' + formatNum(gain);
  span.style.left = (e.clientX - 20) + 'px';
  span.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(span);
  setTimeout(() => span.remove(), 900);

  updateDisplay();
  checkAchievements();
}

// ═══════════════════════════════════════════════════════════════════════
//  BUY BUILDING
// ═══════════════════════════════════════════════════════════════════════

function buyBuilding(bId) {
  const b = BUILDINGS.find(x => x.id === bId);
  const cost = buildingCost(b);
  if (G.things < cost) return;
  G.things -= cost;
  G.buildings[bId]++;
  renderBuildings();
  renderUpgrades();
  checkAchievements();
  updateDisplay();
}

// ═══════════════════════════════════════════════════════════════════════
//  BUY UPGRADE
// ═══════════════════════════════════════════════════════════════════════

function buyUpgrade(uId) {
  const u = UPGRADES.find(x => x.id === uId);
  if (!u || G.purchasedUpgrades.has(uId)) return;
  if (u.type === 'building' && G.buildings[u.building] < u.requires) return;
  if (G.things < u.cost) return;
  G.things -= u.cost;
  G.purchasedUpgrades.add(uId);
  renderUpgrades();
  renderBuildings();
  updateDisplay();
}

// ═══════════════════════════════════════════════════════════════════════
//  ACHIEVEMENTS
// ═══════════════════════════════════════════════════════════════════════

function checkAchievements() {
  const cps = totalCps();
  const checks = {
    ach_first_click:    G.clickCount >= 1,
    ach_100_things:     G.allTime >= 100,
    ach_1k_things:      G.allTime >= 1000,
    ach_1m_things:      G.allTime >= 1e6,
    ach_1b_things:      G.allTime >= 1e9,
    ach_1t_things:      G.allTime >= 1e12,
    ach_first_atom:     G.buildings.atom >= 1,
    ach_first_cell:     G.buildings.cell >= 1,
    ach_first_mind:     G.buildings.mind >= 1,
    ach_first_galaxy:   G.buildings.galaxy >= 1,
    ach_first_universe: G.buildings.universe >= 1,
    ach_everything:     G.buildings.everything >= 1,
    ach_100_atoms:      G.buildings.atom >= 100,
    ach_50_minds:       G.buildings.mind >= 50,
    ach_10_cps:         cps >= 10,
    ach_1000_cps:       cps >= 1000,
    ach_1m_cps:         cps >= 1e6,
    ach_click_100:      G.clickCount >= 100,
    ach_click_1000:     G.clickCount >= 1000,
    ach_all_buildings:  BUILDINGS.every(b => G.buildings[b.id] >= 1),
  };

  let newlyUnlocked = false;
  for (const [id, cond] of Object.entries(checks)) {
    if (cond && !G.unlockedAchievements.has(id)) {
      G.unlockedAchievements.add(id);
      const ach = ACHIEVEMENTS.find(a => a.id === id);
      if (ach) showMilestone(ach.icon + ' ' + ach.name);
      newlyUnlocked = true;
    }
  }
  if (newlyUnlocked) renderAchievements();
}

function showMilestone(text) {
  const el = document.createElement('div');
  el.className = 'milestone-flash';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ═══════════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════════

function updateDisplay() {
  document.getElementById('things-count').textContent = formatNum(G.things);
  document.getElementById('hs-total').textContent     = formatNum(G.things);
  document.getElementById('hs-alltime').textContent   = formatNum(G.allTime);
  document.getElementById('cps-display').textContent  = formatNum(totalCps()) + ' things per second';
  document.getElementById('cpc-display').textContent  = formatNum(thingsPerClick()) + ' things per click';
}

function renderBuildings() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  BUILDINGS.forEach(b => {
    const cost = buildingCost(b);
    const affordable = G.things >= cost;
    const owned = G.buildings[b.id];
    const bMult = getBuildingMultiplier(b.id);
    const actualCps = b.baseCps * bMult;

    const row = document.createElement('div');
    row.className = 'building-row' + (affordable ? '' : ' unaffordable');
    row.onclick = () => buyBuilding(b.id);
    row.innerHTML = `
      <div class="building-icon">${b.icon}</div>
      <div class="building-info">
        <div class="building-name">${b.name}</div>
        <div class="building-cost">🪙 ${formatNum(cost)}</div>
        <div class="building-prod">+${formatNum(actualCps)}/sec each</div>
      </div>
      <div class="building-count">${owned}</div>
      <div class="btooltip">
        <strong>${b.icon} ${b.name}</strong>
        ${b.desc}
        <br><br>
        <span style="color:var(--green)">Owned: ${owned}</span><br>
        <span style="color:var(--accent2)">Total output: ${formatNum(actualCps * owned)}/sec</span>
      </div>`;
    list.appendChild(row);
  });
}

function renderUpgrades() {
  const list = document.getElementById('upgrades-list');
  list.innerHTML = '';

  // show only visible upgrades: not purchased, and either click type or building requirement met at 60%
  const visible = UPGRADES.filter(u => {
    if (G.purchasedUpgrades.has(u.id)) return true; // show purchased (greyed)
    if (u.type === 'click') return true;
    if (u.type === 'building') {
      const owned = G.buildings[u.building];
      return owned >= Math.floor(u.requires * 0.6);
    }
    return false;
  });

  visible.forEach(u => {
    const purchased = G.purchasedUpgrades.has(u.id);
    const meetReq = u.type !== 'building' || G.buildings[u.building] >= u.requires;
    const affordable = !purchased && meetReq && G.things >= u.cost;

    const btn = document.createElement('div');
    btn.className = 'upgrade-btn' +
      (affordable ? ' affordable' : '') +
      (purchased  ? ' purchased'  : '');
    btn.innerHTML = `
      ${u.icon}
      <div class="tooltip">
        <strong>${u.name}</strong>
        <span class="effect">${u.desc}</span><br>
        <span class="cost">Cost: ${formatNum(u.cost)}</span>
        ${u.requires ? `<br><span style="color:var(--text-dim)">Needs ${u.requires} ${BUILDINGS.find(b => b.id === u.building)?.name || u.building}s</span>` : ''}
      </div>`;
    if (!purchased) btn.onclick = () => buyUpgrade(u.id);
    list.appendChild(btn);
  });
}

function renderAchievements() {
  const grid = document.getElementById('ach-grid');
  grid.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const unlocked = G.unlockedAchievements.has(a.id);
    const item = document.createElement('div');
    item.className = 'ach-item ' + (unlocked ? 'unlocked' : 'locked');
    item.innerHTML = `
      ${a.icon}
      <div class="ach-tooltip">
        <strong style="color:var(--gold)">${a.name}</strong><br>${a.desc}
        <br><em style="color:var(--text-dim)">${unlocked ? '✓ Unlocked' : '🔒 Locked'}</em>
      </div>`;
    grid.appendChild(item);
  });
}

function openAchievements() {
  renderAchievements();
  document.getElementById('achievements-panel').classList.add('open');
}

function closeAchievements() {
  document.getElementById('achievements-panel').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════════════════════════

function saveGame() {
  const data = {
    things: G.things,
    allTime: G.allTime,
    clickCount: G.clickCount,
    buildings: G.buildings,
    purchasedUpgrades: [...G.purchasedUpgrades],
    unlockedAchievements: [...G.unlockedAchievements],
    lastSave: Date.now(),
  };
  try {
    localStorage.setItem('everythingClicker_save', JSON.stringify(data));
    showMilestone('💾 Game Saved!');
  } catch (e) {
    console.warn('Save failed:', e);
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('everythingClicker_save');
    if (!raw) return;
    const data = JSON.parse(raw);
    G.things      = data.things      || 0;
    G.allTime     = data.allTime     || 0;
    G.clickCount  = data.clickCount  || 0;
    G.buildings   = Object.assign(Object.fromEntries(BUILDINGS.map(b => [b.id, 0])), data.buildings || {});
    G.purchasedUpgrades   = new Set(data.purchasedUpgrades   || []);
    G.unlockedAchievements = new Set(data.unlockedAchievements || []);

    // offline earnings
    if (data.lastSave) {
      const offlineSec = (Date.now() - data.lastSave) / 1000;
      if (offlineSec > 5) {
        const offlineEarned = totalCps() * offlineSec * 0.5; // 50% offline rate
        if (offlineEarned > 0) {
          G.things  += offlineEarned;
          G.allTime += offlineEarned;
          showMilestone('⏱️ Offline: +' + formatNum(offlineEarned) + ' Things');
        }
      }
    }
  } catch (e) {
    console.warn('Load failed:', e);
  }
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone!')) {
    localStorage.removeItem('everythingClicker_save');
    G = createInitialState();
    renderAll();
    showMilestone('🔄 Game Reset');
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  NUMBER FORMATTING
// ═══════════════════════════════════════════════════════════════════════

function formatNum(n) {
  if (!isFinite(n)) return '0';
  n = Math.floor(n * 10) / 10;
  if (n < 1000)       return Number.isInteger(n) ? n.toString() : n.toFixed(1);
  if (n < 1e6)        return (n/1e3).toFixed(2)  + 'K';
  if (n < 1e9)        return (n/1e6).toFixed(2)  + 'M';
  if (n < 1e12)       return (n/1e9).toFixed(2)  + 'B';
  if (n < 1e15)       return (n/1e12).toFixed(2) + 'T';
  if (n < 1e18)       return (n/1e15).toFixed(2) + 'Qa';
  if (n < 1e21)       return (n/1e18).toFixed(2) + 'Qi';
  return n.toExponential(2);
}

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════

function renderAll() {
  renderBuildings();
  renderUpgrades();
  renderAchievements();
  updateDisplay();
}

// auto-save every 30 seconds
setInterval(saveGame, 30000);

loadGame();
renderAll();
lastTick = Date.now();
requestAnimationFrame(tick);
</script>
